# SonarQube-Projektkonfiguration.
#
# Zweck dieser Datei: Regel-Entscheidungen versionskontrolliert und reviewbar im Repo
# festhalten, statt sie als server-seitige „Won't Fix"-Klicks zu vergraben (die bei einem
# frischen Server/Re-Scan verloren gehen). sonar-scanner liest diese Datei automatisch.
sonar.projectKey=bibliothek

# ── Regel-Ausschlüsse ────────────────────────────────────────────────────────────────────
# go:S3776 (Cognitive Complexity) wird auf TESTDATEIEN nicht erzwungen. Table-driven Tests
# mit langem, sequenziellem Setup/Assert reißen die Schwelle systematisch, ohne dass ein
# Aufsplitten die Wartbarkeit verbessert — es zerreißt eher den zusammenhängenden Testfluss.
# Für PRODUKTIONSCODE bleibt die Regel voll aktiv; dort wurde jede Funktion auf <15 gebracht.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

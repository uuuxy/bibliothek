version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: bibliothek-db-local
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geheim}
      - POSTGRES_DB=${POSTGRES_DB:-bibliothek}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bibliothek}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bibliothek-backend-local
    ports:
      - "8083:8083" # Lokaler Zugriff unter http://localhost:8083
    environment:
      - PORT=8083
      - DB_HOST=postgres-db
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-geheim}@postgres-db:5432/${POSTGRES_DB:-bibliothek}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-supergeheim_lokal}
      - COOKIE_SECURE=false
      - INITIAL_ADMIN_EMAIL=pflasch@philipp-reis-schule.de
    volumes:
      - bibliothek_uploads_local:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy

volumes:
  postgres_data_local:
  bibliothek_uploads_local:

# Kein 'external: true' Netzwerk hier definiert. Docker erstellt automatisch ein lokales Brücken-Netzwerk.

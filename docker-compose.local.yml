version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: bibliothek-db-local
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt - bitte .env aus .env.example anlegen (cp .env.example .env)}
      - POSTGRES_DB=${POSTGRES_DB:-bibliothek}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bibliothek}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bibliothek-backend-local
    ports:
      - "8084:8084" # Lokaler Zugriff unter http://localhost:8084
    environment:
      - PORT=8084
      - DB_HOST=postgres-db
      # Lokaler Entwicklungsmodus (APP_ENV=local): COOKIE_SECURE=false, Guard aus.
      # Das DB-Passwort kommt aus der .env (POSTGRES_PASSWORD) — kein committetes
      # Default-Secret mehr; siehe .env.example (cp .env.example .env).
      - APP_ENV=local
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt - bitte .env aus .env.example anlegen (cp .env.example .env)}@postgres-db:5432/${POSTGRES_DB:-bibliothek}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-local-dev-jwt-secret-min-32-characters}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-super-secure-aes-key-32-chars-ok}
      - COOKIE_SECURE=false
      - INITIAL_ADMIN_EMAIL=pflasch@philipp-reis-schule.de
      - IMAP_HOST=mock
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_PASS=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_SENDER=${SMTP_FROM}
      - SMTP_TO=${SMTP_TO}
    volumes:
      - bibliothek_uploads_local:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - default
      - caddy_global_net

volumes:
  postgres_data_local:
  bibliothek_uploads_local:

networks:
  default: {}
  caddy_global_net:
    external: true

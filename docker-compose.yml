version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: bibliothek-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
      - POSTGRES_DB=${POSTGRES_DB:-bibliothek}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bibliothek}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bibliothek-backend
    ports:
      - "8083:8083" # Localhost-Binding für globalen Caddy Reverse Proxy
    environment:
      - PORT=8083
      - DB_HOST=postgres-db
      # WICHTIG (Produktion): JWT_SECRET und APP_ENCRYPTION_KEY MÜSSEN als echte,
      # geheime Werte gesetzt werden (z. B. via .env). Der Server verweigert sonst
      # außerhalb von APP_ENV=local den Start (bekannte Default-Secrets sind gesperrt).
      # Hinter TLS-Proxy (Caddy) zusätzlich COOKIE_SECURE=true setzen.
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}@postgres-db:5432/${POSTGRES_DB:-bibliothek}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET muss gesetzt sein (>=32 Zeichen, geheim)}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY muss gesetzt sein (32 Byte)}
      - IMAP_HOST=${IMAP_HOST:-mock}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-pflasch@philipp-reis-schule.de}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_PASS=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_SENDER=${SMTP_FROM}
      - SMTP_TO=${SMTP_TO}
    volumes:
      - bibliothek_uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy


volumes:
  postgres_data:
  bibliothek_uploads:

networks:
  default:
    name: caddy_global_net
    external: true

version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: bibliothek-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geheim}
      - POSTGRES_DB=${POSTGRES_DB:-bibliothek}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bibliothek}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bibliothek-backend
    ports:
      - "8083:8083" # Localhost-Binding für globalen Caddy Reverse Proxy
    environment:
      - PORT=8083
      - DB_HOST=postgres-db
      # ── Sicherheit / Secrets ────────────────────────────────────────────────
      # Test-/Pilotphase (Standard): Der Stack startet auch mit den Default-Secrets.
      #
      # VOR DEM ECHTEN PROD-DEPLOY in der .env setzen und damit die harte
      # Absicherung scharf schalten:
      #   ENFORCE_PROD_SECRETS=true
      #   JWT_SECRET=<zufällig, >=32 Zeichen>
      #   APP_ENCRYPTION_KEY=<exakt 32 Byte>
      #   POSTGRES_PASSWORD=<eigenes Passwort>
      #   COOKIE_SECURE=true   # hinter Caddy-HTTPS
      # Mit ENFORCE_PROD_SECRETS=true verweigert der Server den Start, falls noch
      # ein bekannter Default-Wert für JWT_SECRET/APP_ENCRYPTION_KEY aktiv ist.
      - APP_ENV=${APP_ENV:-production}
      - ENFORCE_PROD_SECRETS=${ENFORCE_PROD_SECRETS:-false}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein (siehe .env)}@postgres-db:5432/${POSTGRES_DB:-bibliothek}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-super-secret-default-key-at-least-32-bytes}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-super-secure-aes-key-32-chars-ok}
      - IMAP_HOST=${IMAP_HOST:-mock}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-pflasch@philipp-reis-schule.de}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_PASS=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_SENDER=${SMTP_FROM}
      - SMTP_TO=${SMTP_TO}
    volumes:
      - bibliothek_uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy


volumes:
  postgres_data:
  bibliothek_uploads:

networks:
  default:
    name: caddy_global_net
    external: true

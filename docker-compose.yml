version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: bibliothek-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geheim}
      - POSTGRES_DB=${POSTGRES_DB:-bibliothek}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bibliothek}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bibliothek-backend
    ports:
      - "8083:8083" # Localhost-Binding für globalen Caddy Reverse Proxy
    environment:
      - PORT=8083
      - DB_HOST=postgres-db
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-geheim}@postgres-db:5432/${POSTGRES_DB:-bibliothek}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-supergeheim}
      - COOKIE_SECURE=false
      - IMAP_HOST=${IMAP_HOST:-mock}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-pflasch@philipp-reis-schule.de}
    volumes:
      - bibliothek_uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy


volumes:
  postgres_data:
  bibliothek_uploads:

networks:
  default:
    name: caddy_global_net
    external: true

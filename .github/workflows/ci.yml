name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Kein Job schreibt ins Repo — der GITHUB_TOKEN braucht nur Lesezugriff.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Push-Serien: nur der jeweils neueste Lauf pro Branch zählt —
# veraltete Läufe werden abgebrochen und verbrennen keine Minuten.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # Aktiviert die DB-Integrationstests (db/constraints_pg_test.go). Ohne diese
      # Variable überspringen sie sich selbst — dann prüfte CI die DB-Invarianten nicht.
      # Der Name MUSS "test" enthalten: die Tests verwerfen das Schema (Notbremse in
      # pruefeTestDatenbank).
      # Ohne Passwort — siehe POSTGRES_HOST_AUTH_METHOD unten.
      TEST_DATABASE_URL: postgres://postgres@localhost:5432/bibliothek_test?sslmode=disable

    # Postgres 15 = Produktionsversion. Die Constraint-Tests prüfen echtes
    # Postgres-Verhalten (z. B. dass ein CHECK nur bei FALSE greift, nicht bei NULL) —
    # das lässt sich mit pgxmock prinzipiell nicht nachbilden.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          # trust statt eines Wegwerf-Passworts: Der Container existiert nur für die
          # Dauer dieses Jobs, ist ausschliesslich über localhost des Runners
          # erreichbar und enthält nur Testdaten. Ein Passwort hier wäre kein
          # Sicherheitsgewinn, sondern nur ein Credential im Repository — und als
          # solches nicht von einem echten zu unterscheiden (SonarQube secrets:S6698).
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: bibliothek_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Verify dependencies
      run: go mod verify

    # Action v8 + gepinnte v2-Version: .golangci.yml nutzt das v2-Schema, und
    # goinstall@latest würde über den alten Modulpfad (ohne /v2) v1 installieren,
    # dessen "config verify" das v2-Schema ablehnt. Version = lokaler Stand.
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.12.2
        args: --timeout=5m
      
    - name: Run Unit Tests
      run: go test -v -race ./...

  frontend-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Frontend Dependencies & Run Vitest
      run: |
        cd frontend
        npm ci
        npm run test

  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    # docker-compose.local.yml referenziert das externe Caddy-Netz des
    # Produktiv-Hosts — auf dem Runner muss es nur existieren.
    # POSTGRES_PASSWORD ist im Compose bewusst Pflicht ohne Default; für den
    # Wegwerf-Stack auf dem Runner reicht ein fester Dummy-Wert.
    - name: Start local stack
      env:
        POSTGRES_PASSWORD: ci-e2e-throwaway-password
      run: |
        docker network create caddy_global_net
        docker compose -f docker-compose.local.yml up -d --build
        for i in $(seq 1 60); do
          curl -sf http://localhost:8084/health >/dev/null && break
          sleep 2
        done
        curl -sf http://localhost:8084/health

    - name: Install Playwright
      run: |
        cd frontend
        npm ci
        npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: |
        cd frontend
        npx playwright test

    - name: Upload traces on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-traces
        path: frontend/test-results/
        retention-days: 7

    - name: Backend logs on failure
      if: failure()
      run: docker logs bibliothek-backend-local --tail 200
